name: Build Signed AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /opt/hostedtoolcache/Java_Temurin_jdk/17.0.14-7/x64
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap project
        run: |
          mkdir -p app
          cd app
          printf 'n\n' | bubblewrap init --manifest https://relateosbday.netlify.app/manifest.json

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/upload.keystore

      - name: Build AAB
        working-directory: app
        run: |
          bubblewrap build \
            --keystore upload.keystore \
            --keystorePassword relateos2026 \
            --keyAlias my-key-alias \
            --keyPassword relateos2026

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: relateos-signed-aab
          path: app/app-release-signed.aab
